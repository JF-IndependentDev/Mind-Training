<svg width="160" height="1000" viewBox="0 0 160 1000" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="energyGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff532e" stop-opacity="0.2"></stop>
      <stop offset="50%" stop-color="#ff532e"></stop>
      <stop offset="100%" stop-color="#ffd8cc"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs>

  <!-- Línea principal -->

  <path d="
      M80 1000
      C40 920 120 850 80 760
      C40 670 120 600 80 500
      C40 400 120 330 80 240
      C40 150 120 80 80 0
    " fill="none" stroke="url(#energyGradient)" stroke-width="4" filter="url(#glow)"></path>

  <!-- Ramificaciones tipo neurona/hongo -->

  <g stroke="#ff532e" stroke-width="2" opacity="0.5">

    <path d="M80 850 C50 830 40 800 45 760" fill="none"></path>
    <path d="M80 850 C110 830 120 800 115 760" fill="none"></path>

    <path d="M80 650 C40 620 35 590 40 540" fill="none"></path>
    <path d="M80 650 C120 620 125 590 120 540" fill="none"></path>

    <path d="M80 420 C45 390 40 360 50 320" fill="none"></path>
    <path d="M80 420 C115 390 120 360 110 320" fill="none"></path>

    <path d="M80 180 C50 150 40 120 45 80" fill="none"></path>
    <path d="M80 180 C110 150 120 120 115 80" fill="none"></path>

  </g>

  <!-- Nodos -->

  <g fill="#ff532e" filter="url(#glow)">
    <circle cx="80" cy="850" r="4"></circle>
    <circle cx="80" cy="650" r="4"></circle>
    <circle cx="80" cy="420" r="4"></circle>
    <circle cx="80" cy="180" r="4"></circle>
  </g>

  <!-- Partículas de energía -->

  <circle r="5" fill="#ffd8cc" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="
        M80 1000
        C40 920 120 850 80 760
        C40 670 120 600 80 500
        C40 400 120 330 80 240
        C40 150 120 80 80 0
      "></animateMotion>
  </circle>

  <circle r="3" fill="#ff532e" filter="url(#glow)">
    <animateMotion dur="6s" begin="1s" repeatCount="indefinite" path="
        M80 1000
        C40 920 120 850 80 760
        C40 670 120 600 80 500
        C40 400 120 330 80 240
        C40 150 120 80 80 0
      "></animateMotion>
  </circle>

  <circle r="2" fill="#ffffff">
    <animateMotion dur="3s" begin="0.5s" repeatCount="indefinite" path="
        M80 1000
        C40 920 120 850 80 760
        C40 670 120 600 80 500
        C40 400 120 330 80 240
        C40 150 120 80 80 0
      "></animateMotion>
  </circle>

</svg>